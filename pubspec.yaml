name: realtime_chat
description: "Flutter realtime chat application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.8.0+1
  retrofit: ^4.4.1
  web_socket_channel: ^3.0.3

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.3

  # Serialization
  json_annotation: ^4.9.0

  # Utils
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  retrofit_generator: ^10.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
